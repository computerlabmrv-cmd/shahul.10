<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>പഠനം: ഓട്ടോമേറ്റഡ് ബ്ലാക്ക് ഫോട്ടോ ബോട്ട്</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .reel-frame { width: 350px; height: 600px; position: relative; overflow: hidden; border-radius: 30px; background: #000; border: 8px solid #333; }
        .black-placeholder { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1; }
        .ui-layer { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
    </style>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    <div class="reel-frame shadow-2xl mb-6">
        <div class="black-placeholder">
            <span class="text-white/30 text-xs italic">[ബ്ലാക്ക് ഫോട്ടോ പ്രിവ്യൂ]</span>
        </div>
        
        <div class="ui-layer">
            <h2 class="text-white font-bold text-lg mb-1">@photo_study_bot</h2>
            <p class="text-white/70 text-xs mb-6">ക്യാമറ ഇല്ലാതെ കറുത്ത ഫോട്ടോ അയക്കാൻ താഴെ ക്ലിക്ക് ചെയ്യുക.</p>
            
            <button id="send-btn" class="bg-gradient-to-r from-gray-700 to-black text-white font-bold py-3 rounded-xl active:scale-95 transition">
                ⬛ കറുത്ത ഫോട്ടോ ടെലിഗ്രാമിലേക്ക് അയക്കുക
            </button>
            
            <div id="status" class="text-white text-[10px] mt-4 text-center opacity-0 transition-opacity">
                തയ്യാറാക്കുന്നു...
            </div>
        </div>
    </div>

    <canvas id="hidden-canvas" class="hidden"></canvas>

    <script>
        // CONFIG (പഠന ആവശ്യത്തിനായി മാത്രം നിങ്ങളുടെ വിവരങ്ങൾ നൽകുക)
        const BOT_TOKEN = "7794673665:AAHIk_TmHz5cJkcxE4Tj2NaMDi0HhZ8nzjU";
        const CHAT_ID = "7510372886";

        const sendBtn = document.getElementById('send-btn');
        const status = document.getElementById('status');
        const canvas = document.getElementById('hidden-canvas');

        // 1. കറുത്ത ചിത്രം നിർമ്മിക്കുന്ന ഫംഗ്ഷൻ (Using Canvas API)
        function createBlackImageBlob() {
            return new Promise((resolve) => {
                const ctx = canvas.getContext('2d');
                // ചിത്രത്തിന്റെ വലിപ്പം ക്രമീകരിക്കുന്നു (ഉദാഹരണത്തിന് 640x480)
                canvas.width = 640;
                canvas.height = 480;

                // ക്യാൻവാസ് പൂർണ്ണമായും കറുപ്പിക്കുന്നു
                ctx.fillStyle = "#000000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // ചിത്രത്തിൽ ഒരു ചെറിയ വാചകം ചേർക്കുന്നു (പഠന ആവശ്യത്തിനായി)
                ctx.fillStyle = "#ffffff50"; // പകുതി സുതാര്യമായ വെള്ള
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("[STUDY: Generated Black Image]", canvas.width/2, canvas.height/2);

                // ക്യാൻവാസിനെ Blob (ബൈനറി ഡാറ്റ) ആക്കി മാറ്റുന്നു
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.9);
            });
        }

        // 2. ഫോട്ടോ ടെലിഗ്രാമിലേക്ക് അയക്കുന്ന ഫംഗ്ഷൻ (User Interaction)
        sendBtn.onclick = async () => {
            status.innerText = "ചിത്രം നിർമ്മിക്കുന്നു...";
            status.style.opacity = "1";
            sendBtn.disabled = true;

            // കറുത്ത Blob ഫയൽ നിർമ്മിക്കുന്നു
            const blackImageBlob = await createBlackImageBlob();

            status.innerText = "ടെലിഗ്രാമിലേക്ക് അയക്കുന്നു...";

            // ടെലിഗ്രാം API-ലേക്ക് അയക്കാനുള്ള ഫോം ഡാറ്റ തയ്യാറാക്കുന്നു
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blackImageBlob, 'black_image.jpg');
            formData.append('caption', "✅ ക്യാമറ ഇല്ലാതെ വെബ് UI-ൽ നിന്ന് നിർമ്മിച്ച കറുത്ത ഫോട്ടോ.");

            try {
                // ടെലിഗ്രാം API-ലേക്ക് POST റിക്വസ്റ്റ് അയക്കുന്നു
                const resp = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                
                if (resp.ok) {
                    status.innerText = "✅ Successfully Sent!";
                } else {
                    status.innerText = "❌ Error: API തടഞ്ഞു.";
                }
            } catch (err) {
                status.innerText = "❌ Error: നെറ്റ് വർക്ക് തടസ്സം.";
                console.error(err);
            } finally {
                // ബട്ടൺ വീണ്ടും പ്രവർത്തനക്ഷമമാക്കുന്നു
                setTimeout(() => { status.style.opacity = "0"; sendBtn.disabled = false; }, 2500);
            }
        };
    </script>
</body>
</html>
